<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GEODET FIELD · Hlavní geodet</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800;900&family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        :root {
            --orange:     #f97316;
            --orange-dk:  #ea6c0a;
            --orange-lt:  #fff7ed;
            --orange-mid: #fed7aa;
            --blue:       #2563eb;
            --blue-lt:    #eff6ff;
            --green:      #16a34a;
            --green-lt:   #f0fdf4;
            --purple:     #7c3aed;
            --purple-lt:  #f5f3ff;
            --red:        #dc2626;
            --red-lt:     #fef2f2;
            --amber:      #d97706;
            --amber-lt:   #fffbeb;
            --bg:         #f4f5f7;
            --surface:    #ffffff;
            --text:       #111827;
            --text2:      #4b5563;
            --text3:      #9ca3af;
            --border:     #e5e7eb;
            --border2:    #d1d5db;
            --shadow-sm:  0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
            --shadow:     0 4px 12px rgba(0,0,0,.10);
            --shadow-lg:  0 8px 32px rgba(0,0,0,.14);
            --r:          12px;
            --r-sm:       8px;
            --font-h:     'Exo 2', sans-serif;
            --font-b:     'Public Sans', sans-serif;
        }

        html, body { height: 100%; }
        body {
            font-family: var(--font-b);
            background: var(--bg);
            color: var(--text);
            overscroll-behavior: none;
        }

        /* ─── OFFLINE BANNER ─── */
        #offlineBanner {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
            background: var(--amber); color: #fff;
            text-align: center; font-size: 12px; font-weight: 700;
            padding: 6px; letter-spacing: .3px;
        }
        #offlineBanner.show { display: block; }
        #syncIndicator {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
            background: var(--blue); color: #fff;
            text-align: center; font-size: 12px; font-weight: 600;
            padding: 6px;
        }
        #syncIndicator.show { display: block; }

        /* ─── APP SHELL ─── */
        #app { display: flex; flex-direction: column; min-height: 100dvh; }

        /* ─── TOPBAR ─── */
        .topbar {
            background: var(--surface);
            border-bottom: 2px solid var(--orange);
            padding: 14px 16px 12px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
            box-shadow: var(--shadow-sm);
        }
        .topbar-brand {
            display: flex; align-items: center; gap: 10px;
        }
        .brand-icon {
            width: 36px; height: 36px;
            background: var(--orange); border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .brand-name {
            font-family: var(--font-h); font-size: 17px; font-weight: 800;
            color: var(--text); letter-spacing: -.3px; line-height: 1;
        }
        .brand-role { font-size: 10px; font-weight: 600; color: var(--orange); text-transform: uppercase; letter-spacing: .8px; }
        .topbar-right { display: flex; align-items: center; gap: 8px; }
        .icon-btn {
            width: 40px; height: 40px; border-radius: var(--r-sm);
            border: none; background: var(--bg); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: background .15s; -webkit-tap-highlight-color: transparent;
        }
        .icon-btn:active { background: var(--border); }
        .notif-dot {
            position: relative;
        }
        .notif-dot::after {
            content: '';
            position: absolute; top: 6px; right: 6px;
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--red); border: 2px solid var(--surface);
        }

        /* ─── BOTTOM NAV ─── */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            background: var(--surface);
            border-top: 1.5px solid var(--border);
            display: grid; grid-template-columns: repeat(4, 1fr);
            padding-bottom: env(safe-area-inset-bottom);
            box-shadow: 0 -4px 16px rgba(0,0,0,.08);
        }
        .bnav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 3px; padding: 10px 4px 8px;
            border: none; background: transparent; cursor: pointer;
            color: var(--text3); font-family: var(--font-b); font-size: 10px; font-weight: 600;
            letter-spacing: .3px; text-transform: uppercase; transition: color .15s;
            position: relative;
        }
        .bnav-item.active { color: var(--orange); }
        .bnav-item.active::after {
            content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 24px; height: 3px; background: var(--orange); border-radius: 0 0 3px 3px;
        }
        .bnav-icon { font-size: 20px; line-height: 1; }
        .bnav-badge {
            position: absolute; top: 6px; right: calc(50% - 18px);
            background: var(--red); color: #fff;
            font-size: 9px; font-weight: 800; padding: 1px 5px;
            border-radius: 99px; font-family: var(--font-h);
        }

        /* ─── CONTENT AREA ─── */
        .content {
            flex: 1;
            padding: 14px 14px calc(74px + env(safe-area-inset-bottom));
            overflow-y: auto;
        }

        /* ─── SECTION HEADER ─── */
        .sec-hdr {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .sec-title {
            font-family: var(--font-h); font-size: 13px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px; color: var(--text2);
        }
        .sec-link {
            font-size: 12px; font-weight: 600; color: var(--orange);
            background: none; border: none; cursor: pointer;
        }

        /* ─── STATS ROW (home) ─── */
        .stats-row {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
            margin-bottom: 20px;
        }
        .stat-tile {
            background: var(--surface); border-radius: var(--r);
            padding: 14px 16px; box-shadow: var(--shadow-sm);
            border-left: 4px solid transparent;
            cursor: pointer; transition: transform .15s;
        }
        .stat-tile:active { transform: scale(.97); }
        .stat-tile.t-orange { border-left-color: var(--orange); }
        .stat-tile.t-blue   { border-left-color: var(--blue); }
        .stat-tile.t-purple { border-left-color: var(--purple); }
        .stat-tile.t-green  { border-left-color: var(--green); }
        .stat-tile.t-red    { border-left-color: var(--red); }
        .stat-num {
            font-family: var(--font-h); font-size: 36px; font-weight: 900;
            line-height: 1; margin-bottom: 2px;
        }
        .t-orange .stat-num { color: var(--orange); }
        .t-blue   .stat-num { color: var(--blue); }
        .t-purple .stat-num { color: var(--purple); }
        .t-green  .stat-num { color: var(--green); }
        .t-red    .stat-num { color: var(--red); }
        .stat-lbl { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .4px; }

        /* ─── TEAM BOARD ─── */
        .team-board {
            display: flex; gap: 10px;
            overflow-x: auto; padding-bottom: 4px;
            margin: 0 -14px; padding-left: 14px; padding-right: 14px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .team-board::-webkit-scrollbar { display: none; }
        .geodet-col {
            background: var(--surface); border-radius: var(--r);
            min-width: 160px; max-width: 160px;
            box-shadow: var(--shadow-sm); padding: 12px 10px;
            flex-shrink: 0;
        }
        .geodet-col-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .geodet-avatar {
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-h); font-size: 14px; font-weight: 800;
            color: #fff; flex-shrink: 0;
        }
        .geodet-col-name { font-family: var(--font-h); font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.2; }
        .geodet-col-count { font-size: 10px; font-weight: 600; color: var(--text3); }
        .geodet-mini-task {
            background: var(--bg); border-radius: 6px; padding: 7px 8px;
            margin-bottom: 6px; border-left: 3px solid transparent;
            cursor: pointer;
        }
        .geodet-mini-task:active { opacity: .8; }
        .gmt-obj { font-family: var(--font-h); font-size: 12px; font-weight: 700; color: var(--text); }
        .gmt-status { font-size: 10px; font-weight: 600; margin-top: 1px; }
        .gmt-assigned { border-left-color: var(--orange); }
        .gmt-assigned .gmt-status { color: var(--orange); }
        .gmt-review   { border-left-color: var(--purple); }
        .gmt-review   .gmt-status { color: var(--purple); }
        .gmt-done     { border-left-color: var(--green); opacity: .65; }
        .gmt-done     .gmt-status { color: var(--green); }
        .geodet-col-empty { font-size: 11px; color: var(--text3); text-align: center; padding: 10px 0; }
        .geodet-col-free { background: var(--green-lt); border: 1.5px dashed #bbf7d0; }
        .geodet-col-free .geodet-col-name { color: var(--green); }

        /* ─── TASK CARD ─── */
        .task-card {
            background: var(--surface); border-radius: var(--r);
            box-shadow: var(--shadow-sm); margin-bottom: 10px;
            overflow: hidden; transition: box-shadow .15s;
        }
        .task-card:active { box-shadow: var(--shadow); }
        .task-card-head {
            padding: 14px 14px 10px;
            display: flex; align-items: flex-start; gap: 10px;
        }
        .task-status-bar {
            width: 4px; border-radius: 99px; flex-shrink: 0;
            align-self: stretch; min-height: 40px;
        }
        .bar-new     { background: var(--blue); }
        .bar-assigned{ background: var(--orange); }
        .bar-review  { background: var(--purple); }
        .bar-done    { background: var(--green); }
        .bar-returned{ background: var(--red); }
        .task-main { flex: 1; min-width: 0; }
        .task-obj {
            font-family: var(--font-h); font-size: 18px; font-weight: 800;
            color: var(--text); line-height: 1; margin-bottom: 4px;
        }
        .task-meta { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
        .task-note { font-size: 13px; color: var(--text2); line-height: 1.5; }
        .task-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
        .chip {
            display: inline-flex; align-items: center; gap: 3px;
            padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 700;
            font-family: var(--font-h); letter-spacing: .2px;
        }
        .chip-new      { background: var(--blue-lt);   color: var(--blue); }
        .chip-assigned { background: var(--orange-lt); color: var(--orange); }
        .chip-review   { background: var(--purple-lt); color: var(--purple); }
        .chip-done     { background: var(--green-lt);  color: var(--green); }
        .chip-returned { background: var(--red-lt);    color: var(--red); }
        .chip-gray     { background: var(--bg);        color: var(--text2); }
        .task-date { font-size: 11px; color: var(--text3); margin-top: 4px; font-weight: 500; }

        /* ─── TASK ACTIONS STRIP ─── */
        .task-actions {
            border-top: 1px solid var(--border);
            padding: 8px 10px;
            display: flex; gap: 6px; overflow-x: auto;
            scrollbar-width: none;
        }
        .task-actions::-webkit-scrollbar { display: none; }
        .tact {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 8px 12px; border-radius: var(--r-sm);
            font-family: var(--font-b); font-size: 13px; font-weight: 600;
            border: none; cursor: pointer; white-space: nowrap; transition: all .15s;
            flex-shrink: 0;
        }
        .tact:active { transform: scale(.96); }
        .tact-primary { background: var(--orange); color: #fff; }
        .tact-primary:active { background: var(--orange-dk); }
        .tact-ghost { background: var(--bg); color: var(--text2); border: 1.5px solid var(--border2); }
        .tact-ghost:active { background: var(--border); }
        .tact-purple { background: var(--purple-lt); color: var(--purple); }
        .tact-green  { background: var(--green-lt);  color: var(--green); }
        .tact-red    { background: var(--red-lt);    color: var(--red); }
        .tact-blue   { background: var(--blue-lt);   color: var(--blue); }

        /* ─── TERMIN BLOCK (inside card) ─── */
        .termin-strip {
            margin: 0 14px 10px;
            padding: 10px 12px; border-radius: 8px;
            font-size: 13px; font-weight: 500;
        }
        .termin-pending  { background: var(--amber-lt); border-left: 3px solid var(--amber); color: #92400e; }
        .termin-confirmed{ background: var(--green-lt); border-left: 3px solid var(--green); color: var(--green); }

        /* ─── REVIEW CARD HIGHLIGHT ─── */
        .task-card.needs-review { border: 2px solid var(--purple); }
        .task-card.needs-review .task-card-head { background: var(--purple-lt); }

        /* ─── RETURNED CARD ─── */
        .task-card.returned { border: 2px solid var(--red); }
        .return-reason {
            margin: 0 14px 10px; padding: 10px 12px;
            background: var(--red-lt); border-left: 3px solid var(--red);
            border-radius: 8px; font-size: 13px; color: var(--red);
        }

        /* ─── INLINE EXPAND ─── */
        .expand-panel { display: none; border-top: 1px solid var(--border); }
        .expand-panel.open { display: block; }
        .expand-body { padding: 14px; }
        .exp-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text3); margin-bottom: 6px; }
        .exp-select {
            width: 100%; padding: 12px 14px;
            background: var(--bg); border: 1.5px solid var(--border2);
            border-radius: var(--r-sm); font-family: var(--font-b); font-size: 15px;
            color: var(--text); outline: none; -webkit-appearance: none; appearance: none;
        }
        .exp-select:focus { border-color: var(--orange); }
        .exp-textarea {
            width: 100%; padding: 12px 14px;
            background: var(--bg); border: 1.5px solid var(--border2);
            border-radius: var(--r-sm); font-family: var(--font-b); font-size: 15px;
            color: var(--text); outline: none; min-height: 80px; resize: vertical;
        }
        .exp-textarea:focus { border-color: var(--orange); }
        .exp-confirm-btn {
            width: 100%; margin-top: 10px; padding: 14px;
            background: var(--orange); color: #fff; border: none;
            border-radius: var(--r-sm); font-family: var(--font-h); font-size: 16px; font-weight: 700;
            cursor: pointer; transition: background .15s;
        }
        .exp-confirm-btn:active { background: var(--orange-dk); }
        .exp-confirm-btn.green { background: var(--green); }
        .exp-confirm-btn.green:active { background: #15803d; }

        /* ─── FAB ─── */
        .fab {
            position: fixed; bottom: calc(76px + env(safe-area-inset-bottom)); right: 16px; z-index: 99;
            width: 56px; height: 56px; border-radius: 50%;
            background: var(--orange); color: #fff; font-size: 26px; font-weight: 300;
            border: none; box-shadow: 0 4px 20px rgba(249,115,22,.5);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform .15s, box-shadow .15s;
        }
        .fab:active { transform: scale(.93); box-shadow: 0 2px 10px rgba(249,115,22,.4); }

        /* ─── FILTER BAR ─── */
        .filter-bar {
            display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px;
            margin-bottom: 14px; scrollbar-width: none;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        .ftab {
            padding: 8px 14px; border-radius: 99px; font-size: 13px; font-weight: 700;
            border: 2px solid var(--border2); background: var(--surface); color: var(--text2);
            cursor: pointer; white-space: nowrap; transition: all .15s; flex-shrink: 0;
            font-family: var(--font-h);
        }
        .ftab:active { transform: scale(.96); }
        .ftab.f-all     { border-color: var(--text2); color: var(--text2); }
        .ftab.f-all.active     { border-color: var(--text); background: var(--text); color: #fff; }
        .ftab.f-new.active     { border-color: var(--blue); background: var(--blue); color: #fff; }
        .ftab.f-assigned.active{ border-color: var(--orange); background: var(--orange); color: #fff; }
        .ftab.f-review.active  { border-color: var(--purple); background: var(--purple); color: #fff; }
        .ftab.f-done.active    { border-color: var(--green); background: var(--green); color: #fff; }
        .ftab.f-returned.active{ border-color: var(--red); background: var(--red); color: #fff; }

        /* ─── MODAL SHEET ─── */
        .sheet-backdrop {
            display: none; position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,.5); backdrop-filter: blur(3px);
        }
        .sheet-backdrop.open { display: block; }
        .sheet {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
            background: var(--surface); border-radius: 20px 20px 0 0;
            padding: 0 0 env(safe-area-inset-bottom);
            box-shadow: 0 -8px 40px rgba(0,0,0,.2);
            transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
            max-height: 92dvh; overflow-y: auto;
            display: none;
        }
        .sheet.open { transform: translateY(0); display: block; }
        .sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 99px; margin: 12px auto 0; }
        .sheet-title {
            font-family: var(--font-h); font-size: 20px; font-weight: 800;
            padding: 16px 20px 4px; color: var(--text);
        }
        .sheet-sub { font-size: 13px; color: var(--text2); padding: 0 20px 16px; border-bottom: 1px solid var(--border); }
        .sheet-body { padding: 16px 20px; }
        .form-group { margin-bottom: 14px; }
        .form-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text3); margin-bottom: 5px; display: block; }
        .form-input, .form-select, .form-textarea {
            width: 100%; padding: 13px 14px;
            background: var(--bg); border: 1.5px solid var(--border2);
            border-radius: var(--r-sm); font-family: var(--font-b); font-size: 16px;
            color: var(--text); outline: none; -webkit-appearance: none; appearance: none;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--orange); background: var(--surface); }
        .form-textarea { min-height: 90px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .sheet-footer { padding: 12px 20px 8px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .sheet-btn {
            flex: 1; padding: 15px; border-radius: var(--r-sm); border: none;
            font-family: var(--font-h); font-size: 16px; font-weight: 700;
            cursor: pointer; transition: all .15s;
        }
        .sheet-btn:active { transform: scale(.97); }
        .sheet-btn-primary { background: var(--orange); color: #fff; }
        .sheet-btn-ghost { background: var(--bg); color: var(--text2); border: 1.5px solid var(--border2); }

        /* ─── TERMIN SHEET ─── */
        #terminSheet {}

        /* ─── LOGIN ─── */
        .login-page {
            min-height: 100dvh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 28px 20px;
            background: var(--text);
            background-image: repeating-linear-gradient(
                45deg,
                rgba(249,115,22,.04) 0px,
                rgba(249,115,22,.04) 2px,
                transparent 2px,
                transparent 12px
            );
        }
        .login-icon-wrap {
            width: 80px; height: 80px; background: var(--orange); border-radius: 22px;
            display: flex; align-items: center; justify-content: center; font-size: 40px;
            margin-bottom: 20px;
            box-shadow: 0 0 60px rgba(249,115,22,.4);
        }
        .login-title { font-family: var(--font-h); font-size: 34px; font-weight: 900; color: #fff; text-align: center; margin-bottom: 4px; letter-spacing: -.5px; }
        .login-sub { font-size: 14px; color: #9ca3af; text-align: center; margin-bottom: 36px; }
        .login-card { background: var(--surface); border-radius: 18px; padding: 24px; width: 100%; max-width: 360px; box-shadow: var(--shadow-lg); }
        .google-btn {
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 15px 20px; border-radius: 12px; border: 1.5px solid var(--border2);
            background: var(--surface); font-family: var(--font-b); font-size: 16px; font-weight: 600;
            color: var(--text); cursor: pointer; transition: all .2s;
        }
        .google-btn:active { background: var(--bg); transform: scale(.98); }
        .login-note { margin-top: 14px; font-size: 11px; color: var(--text3); text-align: center; font-family: var(--font-h); letter-spacing: .3px; text-transform: uppercase; }
        .error-box { margin-bottom: 14px; padding: 12px; background: var(--red-lt); border-radius: 9px; font-size: 13px; color: var(--red); font-weight: 500; }

        /* ─── SPINNER ─── */
        .full-spinner { min-height: 100dvh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
        .spinner { width: 44px; height: 44px; border: 3px solid var(--border2); border-top-color: var(--orange); border-radius: 50%; animation: spin .65s linear infinite; }

        .review-banner-arrow { margin-left: auto; font-size: 20px; opacity: .7; }

        /* ─── FILE LINKS ─── */

        .file-link-green { background: var(--green-lt); color: var(--green); }

        @keyframes slide-in { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .task-card { animation: slide-in .2s ease both; }

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as firebaseSignOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

const CACHE_KEY = 'geodet_field_cache';

emailjs.init(EMAIL_CFG.publicKey);

const geodetEmails = {
    'Dalibor Straka':'dalibor.straka@strabag.com','Tomáš Horáček':'tomas.horacek@strabag.com',
    'Petr Kočiš':'petr.kocis@strabag.com','Michal Apt':'michal.apt@strabag.com',
    'Alexandra Pinkovska':'alexandra.pinkovska@strabag.com','Matej Kovac':'matej.kovac@strabag.com',
    'Roland Klimt':'roland.klimt@strabag.com','Martin Morvay':'martin.morvay@strabag.com'
};

const ALLOWED_EMAILS = ['mavesela@atlas.cz','tomaula@gmail.com','jan.trnous@gmail.com','michalapt84@gmail.com','michaela.smejkalpeckova@gmail.com'];

const geodeti = ['Dalibor Straka','Tomáš Horáček','Petr Kočiš','Michal Apt','Alexandra Pinkovska','Matej Kovac','Roland Klimt','Jan Trnka','Martin Morvay'];

// Barvy avatarů
const avatarColors = ['#f97316','#2563eb','#16a34a','#7c3aed','#dc2626','#0891b2','#d97706','#4f46e5','#be185d'];
const geodetColor = (name) => {
    const idx = geodeti.indexOf(name);
    return avatarColors[idx % avatarColors.length] || '#6b7280';
};
const initials = (name) => name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();

// ── OFFLINE / CACHE ───────────────────────────────────────────────
let isOnline = navigator.onLine;
window.addEventListener('online', () => { isOnline = true; document.getElementById('offlineBanner').classList.remove('show'); syncPending(); loadData(); });
window.addEventListener('offline', () => { isOnline = false; document.getElementById('offlineBanner').classList.add('show'); });
if (!isOnline) document.getElementById('offlineBanner').classList.add('show');

let pendingActions = JSON.parse(localStorage.getItem('geodet_pending') || '[]');

async function syncPending() {
    if (!isOnline || pendingActions.length === 0) return;
    document.getElementById('syncIndicator').classList.add('show');
    for (const action of [...pendingActions]) {
        try {
            await fetch(`${API_URL}?${new URLSearchParams(action)}`);
            pendingActions = pendingActions.filter(a => a !== action);
        } catch(e) {}
    }
    localStorage.setItem('geodet_pending', JSON.stringify(pendingActions));
    document.getElementById('syncIndicator').classList.remove('show');
    await loadData();
}

async function apiCall(params) {
    const p = new URLSearchParams(params);
    if (isOnline) {
        const r = await fetch(`${API_URL}?${p}`);
        return r.json();
    } else {
        pendingActions.push(params);
        localStorage.setItem('geodet_pending', JSON.stringify(pendingActions));
        return { ok: true, offline: true };
    }
}

function saveCache(data) {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
}
function loadCache() {
    try {
        const c = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
        return c?.data || [];
    } catch(e) { return []; }
}

// ── STATE ─────────────────────────────────────────────────────────
let state = {
    isAuth: false, isLoading: true, currentUser: null,
    requests: [], loading: false, loginError: null,
    view: 'home', filter: 'all',
    terminModal: { reqId: null },
    reviewModal: { reqId: null, returnMode: false },
};

// ── HELPERS ───────────────────────────────────────────────────────
function parseFileIds(s) { return s ? s.split(',').map(x=>x.trim()).filter(Boolean) : []; }
function driveUrl(id)    { return `https://drive.google.com/file/d/${id}/view`; }

function getBarClass(stav) {
    return { 'Nový':'bar-new','Přiřazeno':'bar-assigned','Čeká na kontrolu':'bar-review','Dokončeno':'bar-done','Vráceno':'bar-returned' }[stav] || 'bar-new';
}
function getChipHtml(stav) {
    const map = {
        'Nový':`<span class="chip chip-new">● Nový</span>`,
        'Přiřazeno':`<span class="chip chip-assigned">◎ Přiřazeno</span>`,
        'Čeká na kontrolu':`<span class="chip chip-review">◈ Ke kontrole</span>`,
        'Dokončeno':`<span class="chip chip-done">✓ Dokončeno</span>`,
        'Vráceno':`<span class="chip chip-returned">↩ Vráceno</span>`,
    };
    return map[stav] || `<span class="chip chip-gray">${stav}</span>`;
}
function getMiniClass(stav) {
    return { 'Přiřazeno':'gmt-assigned','Čeká na kontrolu':'gmt-review','Dokončeno':'gmt-done' }[stav] || 'gmt-assigned';
}

function filteredRequests() {
    const f = state.filter;
    if (f === 'all')     return state.requests;
    if (f === 'new')     return state.requests.filter(r => r.stav === 'Nový');
    if (f === 'assigned')return state.requests.filter(r => r.stav === 'Přiřazeno');
    if (f === 'review')  return state.requests.filter(r => r.stav === 'Čeká na kontrolu');
    if (f === 'done')    return state.requests.filter(r => r.stav === 'Dokončeno');
    if (f === 'returned')return state.requests.filter(r => r.stav === 'Vráceno');
    return state.requests;
}

// ── DATA ──────────────────────────────────────────────────────────
async function loadData() {
    state.loading = true; render();
    // Load from cache first
    const cached = loadCache();
    if (cached.length) { state.requests = cached; state.loading = false; render(); }
    if (!isOnline) { state.loading = false; render(); return; }
    try {
        const r = await fetch(`${API_URL}?action=getAll`);
        const data = await r.json();
        state.requests = data;
        saveCache(data);
    } catch(e) { console.error(e); }
    state.loading = false; render();
}

// ── ASSIGN ────────────────────────────────────────────────────────
window.assignGeodet = async function(reqId, geodet) {
    if (!geodet) return;
    const req = state.requests.find(r => r.id == reqId);
    if (!req) return;
    try {
        await apiCall({ action:'update', id:reqId, pridelenyGeodet:geodet, stav:'Přiřazeno' });
        // Optimistic update
        req.pridelenyGeodet = geodet; req.stav = 'Přiřazeno';
        const email = geodetEmails[geodet];
        if (email && isOnline) {
            try {
                await emailjs.send(EMAIL_CFG.serviceId, EMAIL_CFG.templateId, {
                    to_email:email, to_name:geodet, objekt_cislo:req.objektCislo,
                    poznamka:req.poznamka, zadal_jmeno:req.jmeno, zadal_email:req.email,
                    datum_pozadavku:req.datumPozadavku,
                    app_url:'https://geodetmasna.github.io/geodet-app/',
                    ma_prilohu: req.prilohaFileId ? 'Ano' : 'Ne'
                });
            } catch(e) {}
        }
        render();
        if (isOnline) await loadData();
    } catch(e) { alert('❌ Chyba při přiřazení'); }
};

window.reassignGeodet = async function(reqId, novyGeodet) {
    if (!novyGeodet) return;
    const req = state.requests.find(r => r.id == reqId);
    if (!req) return;
    const puvodni = req.pridelenyGeodet;
    if (novyGeodet === puvodni) { alert('⚠️ Stejný geodet'); return; }
    if (!confirm(`Přeřadit "${req.objektCislo}"?\n${puvodni} → ${novyGeodet}`)) { render(); return; }
    try {
        await apiCall({ action:'update', id:reqId, pridelenyGeodet:novyGeodet, stav:'Přiřazeno' });
        req.pridelenyGeodet = novyGeodet; req.stav = 'Přiřazeno';
        const email = geodetEmails[novyGeodet];
        if (email && isOnline) {
            try {
                await emailjs.send(EMAIL_CFG.serviceId, EMAIL_CFG.templateId, {
                    to_email:email, to_name:novyGeodet, objekt_cislo:req.objektCislo,
                    poznamka:`[PŘEŘAZENO od: ${puvodni}] ${req.poznamka}`,
                    zadal_jmeno:req.jmeno, zadal_email:req.email,
                    datum_pozadavku:req.datumPozadavku,
                    app_url:'https://geodetmasna.github.io/geodet-app/',
                    ma_prilohu: req.prilohaFileId ? 'Ano' : 'Ne'
                });
            } catch(e) {}
        }
        render();
        if (isOnline) await loadData();
    } catch(e) { alert('❌ Chyba při přeřazení'); }
};

// ── REVIEW / SCHVÁLENÍ ────────────────────────────────────────────
let reviewReqId = null;
let returnMode = false;

window.openReviewSheet = function(reqId) {
    reviewReqId = reqId;
    returnMode = false;
    const req = state.requests.find(r => r.id == reqId);
    if (!req) return;
    document.getElementById('reviewSheetTitle').textContent = `Zkontrolovat: ${req.objektCislo}`;
    document.getElementById('reviewSheetSub').textContent = `Geodet: ${req.pridelenyGeodet} · Dokončeno: ${req.datumDokonceni||'—'}`;
    const fotkyIds = parseFileIds(req.fotkaFileId);
    document.getElementById('reviewSheetResult').innerHTML = `
        ${req.typZamereni ? `<div style="margin-bottom:8px"><span class="chip chip-gray">${req.typZamereni}</span></div>` : ''}
        ${req.poznamkaGeodeta ? `<div style="background:var(--bg);border-radius:8px;padding:12px;font-size:14px;color:var(--text2);margin-bottom:12px">"${req.poznamkaGeodeta}"</div>` : ''}
        ${fotkyIds.length > 0 ? `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">${fotkyIds.map((id,i)=>`<a href="${driveUrl(id)}" target="_blank" class="file-link file-link-green">📷 Soubor ${i+1}</a>`).join('')}</div>` : ''}
        <div style="font-size:12px;color:var(--text3)">Datum dokončení: ${req.datumDokonceni||'—'}</div>
    `;
    document.getElementById('returnReasonGroup').style.display = 'none';
    document.getElementById('returnReason').value = '';
    document.getElementById('approveBtn').style.display = '';
    document.getElementById('returnBtn').textContent = '✕ Vrátit k opravě';
    document.getElementById('reviewBackdrop').classList.add('open');
    document.getElementById('reviewSheet').classList.add('open');
};

window.closeReviewSheet = function() {
    document.getElementById('reviewBackdrop').classList.remove('open');
    document.getElementById('reviewSheet').classList.remove('open');
};

window.showReturnForm = function() {
    if (returnMode) { window.returnTask(); return; }
    returnMode = true;
    document.getElementById('returnReasonGroup').style.display = 'block';
    document.getElementById('returnBtn').textContent = '↩ Potvrdit vrácení';
    document.getElementById('approveBtn').style.display = 'none';
};

window.approveTask = async function() {
    const req = state.requests.find(r => r.id == reviewReqId);
    if (!req) return;
    try {
        await apiCall({ action:'update', id:reviewReqId, stav:'Dokončeno' });
        req.stav = 'Dokončeno';
        closeReviewSheet();
        render();
        if (isOnline) await loadData();
    } catch(e) { alert('❌ Chyba při schvalování'); }
};

window.returnTask = async function() {
    const reason = document.getElementById('returnReason').value.trim();
    if (!reason) { alert('❌ Zadejte důvod vrácení'); return; }
    const req = state.requests.find(r => r.id == reviewReqId);
    if (!req) return;
    try {
        await apiCall({ action:'update', id:reviewReqId, stav:'Vráceno', poznamkaHlavni: reason });
        req.stav = 'Vráceno'; req.poznamkaHlavni = reason;
        closeReviewSheet();
        render();
        if (isOnline) await loadData();
    } catch(e) { alert('❌ Chyba při vrácení'); }
};

// ── TERMIN ────────────────────────────────────────────────────────
let terminReqId = null;

window.openTerminSheet = function(reqId, datum, cas) {
    terminReqId = reqId;
    document.getElementById('tsDatum').value = datum || '';
    document.getElementById('tsCas').value = cas || '';

window.confirmTermin = async function() {
    const datum = document.getElementById('tsDatum').value;
    const cas   = document.getElementById('tsCas').value;
    if (!datum || !cas) { alert('❌ Vyplňte datum i čas'); return; }
    const req = state.requests.find(r => r.id == terminReqId);
    if (!req) return;
    try {
        await apiCall({ action:'update', id:terminReqId, schvaleneDatum:datum, schvalenyCas:cas, terminPotvrzen:'Ano' });
        req.schvaleneDatum = datum; req.schvalenyCas = cas; req.terminPotvrzen = 'Ano';
        if (isOnline) {
            await emailjs.send(EMAIL_CFG.serviceId, 'template_termin_schvalen', {
                to_email:req.email, to_name:req.jmeno, objekt_cislo:req.objektCislo,
                pozadovane_datum:req.pozadovaneDatum, pozadovany_cas:req.pozadovanyCas,
                schvalene_datum:datum, schvaleny_cas:cas,
                byl_upraven: datum!==req.pozadovaneDatum||cas!==req.pozadovanyCas ? 'Ano':'Ne',
                status_text:'✓ Termín potvrzen', akce_text:'potvrdil', poznamka:req.poznamka
            }).catch(e => console.error(e));
        }
        closeTerminSheet();
        render();
        if (isOnline) await loadData();

// ── INLINE TOGGLES ────────────────────────────────────────────────
window.toggleExpand = function(id, type) {
    const el = document.getElementById(`expand-${type}-${id}`);
    if (el) el.classList.toggle('open');
};

// ── NEW TASK ─────────────────────────────────────────────────────
window.openNewTask = function() {
    // Populate geodet select
    const sel = document.getElementById('ntGeodet');
    sel.innerHTML = `<option value="">— přiřadit —</option>` + geodeti.map(g=>`<option value="${g}">${g}</option>`).join('');

    document.getElementById('ntTyp').value = '';
    document.getElementById('ntPoznamka').value = '';
    document.getElementById('ntDatum').value = '';
    document.getElementById('newTaskBackdrop').classList.add('open');
    document.getElementById('newTaskSheet').classList.add('open');
    setTimeout(() => document.getElementById('ntObjekt').focus(), 350);
};
window.closeNewTask = function() {
    document.getElementById('newTaskBackdrop').classList.remove('open');
    document.getElementById('newTaskSheet').classList.remove('open');
};
window.submitNewTask = async function() {
    const objekt  = document.getElementById('ntObjekt').value.trim();
    const typ     = document.getElementById('ntTyp').value;
    const geodet  = document.getElementById('ntGeodet').value;
    const datum   = document.getElementById('ntDatum').value;
    const pozn    = document.getElementById('ntPoznamka').value.trim();
    if (!objekt) { alert('❌ Zadejte číslo objektu'); return; }
    const user = state.currentUser;
    const dnes = new Date().toLocaleDateString('cs-CZ');
    const poznamkaFull = [pozn, typ?`[Typ: ${typ}]`:''].filter(Boolean).join(' ');
    try {
        await apiCall({
            action:'add', objektCislo:objekt,
            jmeno: user.displayName||user.email, email:user.email,
            poznamka: poznamkaFull, typZamereni:typ,
            datumPozadavku:dnes, pozadovaneDatum:datum,
            stav: geodet ? 'Přiřazeno' : 'Nový',
            pridelenyGeodet: geodet || ''
        });
        if (geodet && isOnline) {
            const email = geodetEmails[geodet];
            if (email) {
                await emailjs.send(EMAIL_CFG.serviceId, EMAIL_CFG.templateId, {
                    to_email:email, to_name:geodet, objekt_cislo:objekt,
                    poznamka:poznamkaFull, zadal_jmeno:user.displayName||user.email,
                    zadal_email:user.email, datum_pozadavku:dnes,
                    app_url:'https://geodetmasna.github.io/geodet-app/', ma_prilohu:'Ne'
                }).catch(e => {});
            }
        }
        closeNewTask();
        if (isOnline) await loadData();
        else { state.requests = loadCache(); render(); }
    } catch(e) { alert('❌ Chyba při vytváření úkolu'); }
};

// ── AUTH ──────────────────────────────────────────────────────────
window.signInWithGoogle = async function() {
    try {
        const result = await signInWithPopup(auth, provider);
        const email = result.user.email.toLowerCase();
        if (!ALLOWED_EMAILS.some(e => email.includes(e.toLowerCase()))) {
            state.loginError = 'Nemáte oprávnění k přístupu.';
            await firebaseSignOut(auth); render();
        }
    } catch(e) { state.loginError = 'Chyba: ' + e.message; render(); }
};
window.signOut = async function() {
    if (!confirm('Odhlásit se?')) return;
    try { await firebaseSignOut(auth); state.requests = []; } catch(e) {}
};

onAuthStateChanged(auth, (user) => {
    state.isLoading = false;
    if (user) {
        const ok = ALLOWED_EMAILS.some(e => user.email.toLowerCase().includes(e.toLowerCase()));
        if (ok) { state.isAuth=true; state.currentUser=user; state.loginError=null; loadData(); }
        else { state.isAuth=false; state.currentUser=null; state.loginError='Nemáte oprávnění.'; firebaseSignOut(auth); }
    } else { state.isAuth=false; state.currentUser=null; }
    render();
});

// ── VIEW SETTERS ──────────────────────────────────────────────────
window.setView = function(v) { state.view=v; state.filter='all'; render(); };
window.setFilter = function(f) { state.filter=f; render(); };
window.refreshData = loadData;

// ── RENDER VIEWS ──────────────────────────────────────────────────

// HOME ─
function renderHome() {
    const reqs = state.requests;
    const novy       = reqs.filter(r => r.stav === 'Nový').length;
    const prirazeno  = reqs.filter(r => r.stav === 'Přiřazeno').length;
    const review     = reqs.filter(r => r.stav === 'Čeká na kontrolu').length;
    const dokonceno  = reqs.filter(r => r.stav === 'Dokončeno').length;
    const vraceno    = reqs.filter(r => r.stav === 'Vráceno').length;
    const total      = reqs.length;

    // Team board
    const activeGeodeti = geodeti.filter(g => reqs.some(r => r.pridelenyGeodet === g));
    const freeGeodeti = geodeti.filter(g => !reqs.some(r => r.pridelenyGeodet === g && (r.stav==='Přiřazeno'||r.stav==='Čeká na kontrolu')));

    const teamBoard = activeGeodeti.map(g => {
        const gReqs = reqs.filter(r => r.pridelenyGeodet === g && r.stav !== 'Dokončeno');
        const done  = reqs.filter(r => r.pridelenyGeodet === g && r.stav === 'Dokončeno').length;
        return `
        <div class="geodet-col">
            <div class="geodet-col-header">
                <div class="geodet-avatar" style="background:${geodetColor(g)}">${initials(g)}</div>
                <div>
                    <div class="geodet-col-name">${g.split(' ')[0]}</div>
                    <div class="geodet-col-count">${gReqs.length} aktiv · ${done} hotovo</div>
                </div>
            </div>
            ${gReqs.length === 0 ? `<div class="geodet-col-empty">Volný</div>` :
              gReqs.slice(0,4).map(r => `
                <div class="geodet-mini-task ${getMiniClass(r.stav)}" onclick="setView('tasks');setFilter('all')">
                    <div class="gmt-obj">${r.objektCislo}</div>
                    <div class="gmt-status">${r.stav}</div>
                </div>
              `).join('') + (gReqs.length > 4 ? `<div class="geodet-col-empty">+${gReqs.length-4} dalších</div>` : '')
            }
        </div>`;
    }).join('');

    const freeCols = freeGeodeti.slice(0,3).map(g => `
        <div class="geodet-col geodet-col-free">
            <div class="geodet-col-header">
                <div class="geodet-avatar" style="background:var(--green)">${initials(g)}</div>
                <div>
                    <div class="geodet-col-name">${g.split(' ')[0]}</div>
                    <div class="geodet-col-count">volný kapacita</div>
                </div>
            </div>
            <div class="geodet-col-empty">✓ Bez přiřazených úkolů</div>
        </div>`).join('');

    const pendingSync = JSON.parse(localStorage.getItem('geodet_pending')||'[]').length;

    return `
    <div class="stats-row">
        <div class="stat-tile t-blue" onclick="setView('tasks');setFilter('new')">
            <div class="stat-num">${novy}</div>
            <div class="stat-lbl">Nové požadavky</div>
        </div>
        <div class="stat-tile t-orange" onclick="setView('tasks');setFilter('assigned')">
            <div class="stat-num">${prirazeno}</div>
            <div class="stat-lbl">V terénu</div>
        </div>
        <div class="stat-tile t-purple" onclick="setView('tasks');setFilter('review')">
            <div class="stat-num">${review}</div>
            <div class="stat-lbl">Ke kontrole</div>
        </div>
        <div class="stat-tile t-green" onclick="setView('tasks');setFilter('done')">
            <div class="stat-num">${dokonceno}</div>
            <div class="stat-lbl">Dokončeno</div>
        </div>
    </div>

    ${review > 0 ? `
    <div class="review-banner" onclick="setView('tasks');setFilter('review')">
        <div class="review-banner-icon">◈</div>
        <div>
            <div class="review-banner-count">${review}</div>
            <div class="review-banner-text">úkol${review>1?'ů':''} čeká na vaši kontrolu</div>
        </div>
        <div class="review-banner-arrow">›</div>
    </div>` : ''}

    ${pendingSync > 0 ? `
    <div style="background:var(--amber-lt);border:1.5px solid var(--orange-mid);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;font-size:13px;font-weight:600;color:var(--amber)">
        ⚡ ${pendingSync} změna${pendingSync>1?'y':''} čeká na synchronizaci
    </div>` : ''}

    <div class="sec-hdr">
        <div class="sec-title">Tým dnes</div>
        <button class="sec-link" onclick="setView('tasks')">Zobrazit vše</button>
    </div>
    <div class="team-board">
        ${teamBoard || '<div style="color:var(--text3);font-size:13px;padding:8px 0">Žádné aktivní přiřazení</div>'}
        ${freeCols}
    </div>

    ${novy > 0 ? `
    <div class="sec-hdr" style="margin-top:20px">
        <div class="sec-title">Nové požadavky (${novy})</div>
    </div>
    ${reqs.filter(r=>r.stav==='Nový').slice(0,3).map(r => renderTaskCard(r)).join('')}
    ${novy > 3 ? `<button style="width:100%;padding:12px;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--r);font-family:var(--font-h);font-size:14px;font-weight:700;color:var(--orange);cursor:pointer" onclick="setView('tasks');setFilter('new')">Zobrazit všech ${novy} nových →</button>` : ''}
    ` : ''}
    `;
}

// TASK CARD ─
function renderTaskCard(req) {
    const fotkyIds = parseFileIds(req.fotkaFileId);
    const isReview   = req.stav === 'Čeká na kontrolu';
    const isReturned = req.stav === 'Vráceno';

    return `
    <div class="task-card ${isReview?'needs-review':''} ${isReturned?'returned':''}">
        <div class="task-card-head">
            <div class="task-status-bar ${getBarClass(req.stav)}"></div>
            <div class="task-main">
                <div class="task-obj">${req.objektCislo}</div>
                <div class="task-meta">${req.jmeno}${req.pridelenyGeodet ? ' · <strong>'+req.pridelenyGeodet+'</strong>' : ''}</div>
                <div class="task-chips">
                    ${getChipHtml(req.stav)}
                    ${req.typZamereni ? `<span class="chip chip-gray">${req.typZamereni}</span>` : ''}
                </div>
                <div class="task-date">${req.datumPozadavku}</div>
            </div>
        </div>

        ${req.poznamka ? `<div style="padding:0 14px 10px;font-size:13px;color:var(--text2);line-height:1.5">${req.poznamka.substring(0,120)}${req.poznamka.length>120?'…':''}</div>` : ''}

        ${isReturned && req.poznamkaHlavni ? `
        <div class="return-reason">↩ Vráceno: ${req.poznamkaHlavni}</div>` : ''}

        ${req.pozadovaneDatum && req.pozadovanyCas ? `
        <div class="termin-strip ${req.terminPotvrzen==='Ano' ? 'termin-confirmed':'termin-pending'}">
            📅 ${req.terminPotvrzen==='Ano' ?
                `Termín potvrzen: ${req.schvaleneDatum||req.pozadovaneDatum} v ${req.schvalenyCas||req.pozadovanyCas}` :
                `Požadovaný termín: ${req.pozadovaneDatum} v ${req.pozadovanyCas}`
            }
        </div>` : ''}

        ${(fotkyIds.length > 0 || req.prilohaFileId) ? `
        <div class="file-links">
            ${req.prilohaFileId ? `<a href="${driveUrl(req.prilohaFileId)}" target="_blank" class="file-link file-link-blue">🔎 Příloha</a>` : ''}
            ${fotkyIds.map((id,i)=>`<a href="${driveUrl(id)}" target="_blank" class="file-link file-link-green">📷 Soubor ${i+1}</a>`).join('')}
        </div>` : ''}

        <div class="task-actions">
            ${req.stav === 'Nový' ? `
                <button class="tact tact-primary" onclick="toggleExpand('${req.id}','assign')">👷 Přiřadit</button>
                ${req.pozadovaneDatum && req.terminPotvrzen !== 'Ano' ? `<button class="tact tact-blue" onclick="openTerminSheet('${req.id}','${req.pozadovaneDatum}','${req.pozadovanyCas}')">📅 Termín</button>` : ''}
            ` : ''}
            ${req.stav === 'Přiřazeno' ? `
                <button class="tact tact-ghost" onclick="toggleExpand('${req.id}','reassign')">🔄 Přeřadit</button>
                ${req.pozadovaneDatum && req.terminPotvrzen !== 'Ano' ? `<button class="tact tact-blue" onclick="openTerminSheet('${req.id}','${req.pozadovaneDatum}','${req.pozadovanyCas}')">📅 Termín</button>` : ''}
            ` : ''}
            ${req.stav === 'Čeká na kontrolu' ? `
                <button class="tact tact-purple" onclick="openReviewSheet('${req.id}')">◈ Zkontrolovat výsledek</button>
            ` : ''}
            ${req.stav === 'Vráceno' ? `
                <button class="tact tact-primary" onclick="toggleExpand('${req.id}','reassign')">🔄 Přeřadit znovu</button>
            ` : ''}
            ${req.stav === 'Dokončeno' ? `
                <span style="font-size:13px;color:var(--green);font-weight:600;padding:8px 4px">✓ Zkontrolováno a schváleno</span>
            ` : ''}
        </div>

        <!-- ASSIGN EXPAND -->
        <div id="expand-assign-${req.id}" class="expand-panel">
            <div class="expand-body">
                <div class="exp-label">Vyberte geodeta</div>
                <select class="exp-select" onchange="assignGeodet('${req.id}',this.value)">
                    <option value="">— Vyberte geodeta —</option>
                    ${geodeti.map(g=>`<option value="${g}">${g}</option>`).join('')}
                </select>
            </div>
        </div>

        <!-- REASSIGN EXPAND -->
        <div id="expand-reassign-${req.id}" class="expand-panel">
            <div class="expand-body">
                <div class="exp-label" style="color:var(--orange)">⚠ Přeřadit na náhradníka</div>
                <select class="exp-select" onchange="reassignGeodet('${req.id}',this.value)" style="border-color:var(--orange-mid)">
                    <option value="">— Vyberte náhradníka —</option>
                    ${geodeti.filter(g=>g!==req.pridelenyGeodet).map(g=>`<option value="${g}">${g}</option>`).join('')}
                </select>
            </div>
        </div>
    </div>`;
}

// TASKS VIEW ─
function renderTasks() {
    const reqs = state.requests;
    const counts = {
        all: reqs.length,
        new: reqs.filter(r=>r.stav==='Nový').length,
        assigned: reqs.filter(r=>r.stav==='Přiřazeno').length,
        review: reqs.filter(r=>r.stav==='Čeká na kontrolu').length,
        done: reqs.filter(r=>r.stav==='Dokončeno').length,
        returned: reqs.filter(r=>r.stav==='Vráceno').length,
    };
    const filtered = filteredRequests();

    const tabs = [
        ['all','f-all','Vše',counts.all],
        ['new','f-new','Nové',counts.new],
        ['assigned','f-assigned','V terénu',counts.assigned],
        ['review','f-review','Ke kontrole',counts.review],
        ['done','f-done','Hotovo',counts.done],
        ['returned','f-returned','Vráceno',counts.returned],
    ];

    return `
    <div class="filter-bar">
        ${tabs.map(([f,cls,label,count]) => `
            <button class="ftab ${cls} ${state.filter===f?'active':''}" onclick="setFilter('${f}')">
                ${label} ${count > 0 ? `(${count})` : ''}
            </button>`).join('')}
    </div>
    ${filtered.length === 0 ?
        `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Žádné záznamy</div><div class="empty-sub">Zkuste jiný filtr</div></div>` :
        filtered.map(req => renderTaskCard(req)).join('')
    }`;
}

// TEAM VIEW ─
function renderTeam() {
    const reqs = state.requests;
    return geodeti.map(g => {
        const assigned = reqs.filter(r=>r.pridelenyGeodet===g && r.stav==='Přiřazeno').length;
        const review   = reqs.filter(r=>r.pridelenyGeodet===g && r.stav==='Čeká na kontrolu').length;
        const done     = reqs.filter(r=>r.pridelenyGeodet===g && r.stav==='Dokončeno').length;
        const returned = reqs.filter(r=>r.pridelenyGeodet===g && r.stav==='Vráceno').length;
        const total    = assigned + review + done + returned;
        const isFree = assigned + review === 0;
        return `
        <div class="task-card" style="${isFree?'opacity:.7':''}">
            <div class="task-card-head">
                <div class="geodet-avatar" style="background:${geodetColor(g)};width:44px;height:44px;border-radius:12px;font-size:16px">${initials(g)}</div>
                <div class="task-main" style="margin-left:10px">
                    <div class="task-obj" style="font-size:17px">${g}</div>
                    <div class="task-chips" style="margin-top:6px">
                        ${assigned > 0 ? `<span class="chip chip-assigned">◎ ${assigned} v terénu</span>` : ''}
                        ${review > 0   ? `<span class="chip chip-review">◈ ${review} ke kontrole</span>` : ''}
                        ${done > 0     ? `<span class="chip chip-done">✓ ${done} hotovo</span>` : ''}
                        ${returned > 0 ? `<span class="chip chip-returned">↩ ${returned} vráceno</span>` : ''}
                        ${total === 0  ? `<span class="chip chip-gray">Volný</span>` : ''}
                    </div>
                </div>
            </div>
            ${total > 0 ? `
            <div class="task-actions">
                <button class="tact tact-ghost" onclick="setView('tasks');setFilter('all')">Zobrazit úkoly →</button>
            </div>` : ''}
        </div>`;
    }).join('');
}

// ── MAIN RENDER ───────────────────────────────────────────────────
function render() {
    const appEl = document.getElementById('app');

    if (state.isLoading) {
        appEl.innerHTML = `<div class="full-spinner"><div class="spinner"></div></div>`;
        return;
    }

    if (!state.isAuth) {
        appEl.innerHTML = `
        <div class="login-page">
            <div class="login-icon-wrap">📐</div>
            <div class="login-title">GEODET FIELD</div>
            <div class="login-sub">Dispečerský přehled · Hlavní geodet</div>
            <div class="login-card">
                ${state.loginError ? `<div class="error-box">${state.loginError}</div>` : ''}
                <button class="google-btn" onclick="signInWithGoogle()">
                    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Přihlásit se přes Google
                </button>
                <div class="login-note">Přístup pouze pro STRABAG</div>
            </div>
        </div>`;
        return;
    }

    const reqs = state.requests;
    const reviewCount  = reqs.filter(r => r.stav === 'Čeká na kontrolu').length;
    const novyCount    = reqs.filter(r => r.stav === 'Nový').length;
    const userName = state.currentUser.displayName || state.currentUser.email;

    const navItems = [
        { view:'home',  icon:'⌂',  label:'Přehled'  },
        { view:'tasks', icon:'☰',  label:'Úkoly'    },
        { view:'team',  icon:'◉',  label:'Tým'      },
    ];

    appEl.innerHTML = `
    <div id="app-inner">
        <div class="topbar">
            <div class="topbar-brand">
                <div class="brand-icon">📐</div>
                <div>
                    <div class="brand-name">GEODET FIELD</div>
                    <div class="brand-role">Hlavní geodet</div>
                </div>
            </div>
            <div class="topbar-right">
                ${!isOnline ? `<span style="font-size:11px;font-weight:700;color:var(--amber);background:var(--amber-lt);padding:4px 8px;border-radius:6px">OFFLINE</span>` : ''}
                <button class="icon-btn ${reviewCount>0?'notif-dot':''}" onclick="refreshData()" title="Obnovit">↻</button>
                <button class="icon-btn" onclick="signOut()" title="Odhlásit" style="font-size:14px;color:var(--text3)">⏻</button>
            </div>
        </div>

        <div class="content">
            ${state.loading && state.requests.length === 0 ?
                `<div style="text-align:center;padding:40px"><div class="spinner" style="margin:0 auto"></div></div>` :
              state.view === 'home'  ? renderHome()  :
              state.view === 'tasks' ? renderTasks() :
              state.view === 'team'  ? renderTeam()  : ''}
        </div>

        <nav class="bottom-nav">
            ${navItems.map(({view,icon,label}) => `
                <button class="bnav-item ${state.view===view?'active':''}" onclick="setView('${view}')">
                    ${view==='tasks' && novyCount > 0 ? `<span class="bnav-badge">${novyCount}</span>` : ''}
                    ${view==='tasks' && reviewCount > 0 ? `<span class="bnav-badge" style="background:var(--purple)">${reviewCount}</span>` : ''}
                    <span class="bnav-icon">${icon}</span>
                    ${label}
                </button>`).join('')}
            <button class="bnav-item" onclick="openNewTask()">
                <span class="bnav-icon">＋</span>
                Ad-hoc
            </button>
        </nav>
    </div>`;

    window.setView   = function(v) { state.view=v; state.filter='all'; render(); };
    window.setFilter = function(f) { state.filterTol=f; state.filter=f; render(); };
}

render();
</script>

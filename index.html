<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIM Koordinátor · Geodetická zaměření</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Barlow:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0d1117;
            --bg2:       #161b22;
            --bg3:       #1c2430;
            --surface:   #21262d;
            --surface2:  #2d333b;
            --border:    #30363d;
            --border2:   #3d444d;

            --teal:      #0ea5e9;
            --teal-dim:  #0369a1;
            --teal-glow: rgba(14,165,233,.15);
            --amber:     #f59e0b;
            --amber-dim: rgba(245,158,11,.15);
            --red:       #ef4444;
            --red-dim:   rgba(239,68,68,.15);
            --green:     #22c55e;
            --green-dim: rgba(34,197,94,.15);
            --purple:    #a855f7;

            --text:      #e6edf3;
            --text2:     #8b949e;
            --text3:     #484f58;

            --font-display: 'Barlow Condensed', sans-serif;
            --font-body:    'Barlow', sans-serif;
            --font-mono:    'Space Mono', monospace;

            --radius:    10px;
            --radius-lg: 14px;
            --shadow:    0 1px 3px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.3);
            --shadow-lg: 0 8px 32px rgba(0,0,0,.5);
        }

        body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }

        h1,h2,h3,h4 { font-family: var(--font-display); letter-spacing: -.3px; }

        /* scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

        /* ── LAYOUT ── */
        .layout { display: flex; min-height: 100vh; }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 230px; background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            position: fixed; top:0; left:0; bottom:0; z-index: 100;
        }
        .sidebar-header {
            padding: 20px 16px 16px;
            border-bottom: 1px solid var(--border);
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-cube {
            width: 34px; height: 34px; background: var(--teal);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 17px; flex-shrink: 0;
            box-shadow: 0 0 20px rgba(14,165,233,.4);
        }
        .logo-name { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.1; }
        .logo-role { font-size: 10px; font-weight: 500; color: var(--teal); letter-spacing: 1.5px; text-transform: uppercase; }

        .sidebar-nav { padding: 12px 10px; flex: 1; overflow-y: auto; }
        .nav-section { margin-bottom: 20px; }
        .nav-section-label {
            font-size: 10px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase;
            color: var(--text3); padding: 0 8px; margin-bottom: 4px;
        }
        .nav-btn {
            display: flex; align-items: center; gap: 9px; width: 100%;
            padding: 8px 10px; border-radius: 8px; border: none; background: transparent;
            color: var(--text2); font-family: var(--font-body); font-size: 13.5px; font-weight: 500;
            cursor: pointer; transition: all .15s; text-align: left; margin-bottom: 1px;
        }
        .nav-btn:hover { background: var(--surface); color: var(--text); }
        .nav-btn.active { background: var(--teal-glow); color: var(--teal); border-left: 2px solid var(--teal); padding-left: 8px; }
        .nav-btn .ni { font-size: 15px; width: 18px; text-align: center; }
        .nav-chip {
            margin-left: auto; font-size: 11px; font-weight: 700; font-family: var(--font-mono);
            padding: 1px 7px; border-radius: 99px;
        }
        .chip-teal { background: var(--teal-glow); color: var(--teal); }
        .chip-amber { background: var(--amber-dim); color: var(--amber); }
        .chip-red { background: var(--red-dim); color: var(--red); }

        .sidebar-footer {
            padding: 12px 10px; border-top: 1px solid var(--border);
        }
        .user-row { display: flex; align-items: center; gap: 9px; padding: 8px 8px; }
        .user-ava {
            width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
            background: linear-gradient(135deg,var(--teal),var(--purple));
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 13px; overflow: hidden;
        }
        .user-ava img { width: 100%; height: 100%; object-fit: cover; }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-tag { font-size: 10px; color: var(--teal); font-weight: 600; letter-spacing: .5px; }
        .signout-btn {
            background: transparent; border: none; color: var(--text3); cursor: pointer;
            font-size: 15px; padding: 5px; border-radius: 6px; transition: all .15s;
        }
        .signout-btn:hover { background: var(--red-dim); color: var(--red); }

        /* ── MAIN ── */
        .main { margin-left: 230px; flex: 1; min-height: 100vh; }

        /* ── TOPBAR ── */
        .topbar {
            background: var(--bg2); border-bottom: 1px solid var(--border);
            padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar-left { display: flex; align-items: center; gap: 10px; }
        .breadcrumb { font-family: var(--font-mono); font-size: 11px; color: var(--text3); }
        .breadcrumb span { color: var(--text2); }
        .page-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--text); }
        .topbar-right { display: flex; gap: 8px; align-items: center; }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: var(--radius); font-family: var(--font-body);
            font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all .15s;
        }
        .btn-teal { background: var(--teal); color: #fff; }
        .btn-teal:hover { background: #38bdf8; box-shadow: 0 0 16px rgba(14,165,233,.4); }
        .btn-ghost { background: var(--surface); color: var(--text2); border: 1px solid var(--border2); }
        .btn-ghost:hover { background: var(--surface2); color: var(--text); }
        .btn-amber { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,.3); }
        .btn-amber:hover { background: rgba(245,158,11,.25); }
        .btn-red { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
        .btn-red:hover { background: rgba(239,68,68,.25); }
        .btn-green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
        .btn-green:hover { background: rgba(34,197,94,.25); }
        .btn-sm { padding: 5px 11px; font-size: 12px; }

        /* ── PAGE CONTENT ── */
        .page-content { padding: 24px 28px 48px; }

        /* ── SECTION ── */
        .section-title { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        /* ── KPI STRIP ── */
        .kpi-strip { display: grid; grid-template-columns: repeat(5,1fr); gap: 12px; margin-bottom: 24px; }
        .kpi {
            background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 16px 18px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
        }
        .kpi:hover { border-color: var(--border2); transform: translateY(-1px); }
        .kpi.active-kpi { border-color: var(--teal); background: var(--teal-glow); }
        .kpi-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
        .kpi-val { font-family: var(--font-mono); font-size: 32px; font-weight: 700; line-height: 1; }
        .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 4px; font-family: var(--font-mono); }
        .kpi-teal .kpi-val { color: var(--teal); }
        .kpi-amber .kpi-val { color: var(--amber); }
        .kpi-red .kpi-val { color: var(--red); }
        .kpi-green .kpi-val { color: var(--green); }
        .kpi-purple .kpi-val { color: var(--purple); }

        /* ── CHARTS GRID ── */
        .charts-grid { display: grid; grid-template-columns: 1.2fr 2fr; gap: 16px; margin-bottom: 24px; }
        .chart-card {
            background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px;
        }
        .chart-card-wide { grid-column: 1 / -1; }
        .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .chart-title { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text); }
        .chart-sub { font-size: 11px; color: var(--text3); font-family: var(--font-mono); margin-top: 2px; }

        /* ── COVERAGE BAR ── */
        .coverage-grid { display: grid; gap: 8px; }
        .cov-row { display: flex; align-items: center; gap: 10px; }
        .cov-label { font-size: 12px; font-family: var(--font-mono); color: var(--text2); width: 80px; flex-shrink: 0; }
        .cov-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
        .cov-fill { height: 100%; border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1); }
        .cov-pct { font-size: 11px; font-family: var(--font-mono); color: var(--text2); width: 32px; text-align: right; }
        .cov-count { font-size: 11px; font-family: var(--font-mono); color: var(--text3); width: 36px; text-align: right; }

        /* ── DEVIATION CARDS ── */
        .dev-grid { display: grid; gap: 10px; margin-bottom: 24px; }
        .dev-card {
            background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 18px 20px; transition: all .2s;
            display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: start;
        }
        .dev-card:hover { border-color: var(--border2); }
        .dev-card.crit { border-left: 3px solid var(--red); }
        .dev-card.warn { border-left: 3px solid var(--amber); }
        .dev-card.ok   { border-left: 3px solid var(--green); }
        .dev-card.proc { border-left: 3px solid var(--teal); }
        .dev-card.new  { border-left: 3px solid var(--purple); }

        .dev-status-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
        .icon-crit { background: var(--red-dim); }
        .icon-warn { background: var(--amber-dim); }
        .icon-ok   { background: var(--green-dim); }
        .icon-proc { background: var(--teal-glow); }
        .icon-new  { background: rgba(168,85,247,.15); }

        .dev-main {}
        .dev-obj { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.1; }
        .dev-meta { font-size: 12px; color: var(--text3); margin-top: 3px; font-family: var(--font-mono); }
        .dev-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .dev-note { font-size: 13px; color: var(--text2); margin-top: 6px; line-height: 1.5; }
        .dev-bcf-link {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 11px; font-family: var(--font-mono); font-weight: 700;
            color: var(--teal); background: var(--teal-glow); padding: 3px 8px; border-radius: 5px; text-decoration: none;
        }
        .dev-bcf-link:hover { background: rgba(14,165,233,.25); }

        .dev-right { text-align: right; flex-shrink: 0; }
        .dev-tolerance-block { }
        .dev-tol-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); font-family: var(--font-mono); }
        .dev-tol-val { font-family: var(--font-mono); font-size: 26px; font-weight: 700; line-height: 1.1; }
        .dev-tol-req { font-size: 11px; font-family: var(--font-mono); color: var(--text3); margin-top: 1px; }
        .dev-actions { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }

        /* ── TAG / BADGE ── */
        .tag {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; font-family: var(--font-mono);
        }
        .tag-crit { background: var(--red-dim); color: var(--red); }
        .tag-warn { background: var(--amber-dim); color: var(--amber); }
        .tag-ok   { background: var(--green-dim); color: var(--green); }
        .tag-proc { background: var(--teal-glow); color: var(--teal); }
        .tag-new  { background: rgba(168,85,247,.15); color: var(--purple); }
        .tag-type { background: var(--surface2); color: var(--text2); }

        /* ── TOLERANCE GAUGE ── */
        .tol-gauge { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
        .tol-track { flex: 1; height: 4px; background: var(--surface2); border-radius: 99px; overflow: visible; position: relative; }
        .tol-fill { height: 100%; border-radius: 99px; transition: width .4s ease; }
        .tol-marker { position: absolute; top: -4px; width: 2px; height: 12px; background: var(--text3); border-radius: 1px; }
        .tol-nums { display: flex; justify-content: space-between; font-size: 9px; font-family: var(--font-mono); color: var(--text3); margin-top: 2px; }

        /* ── ASSIGN ROW ── */
        .assign-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .assign-label { font-size: 11px; color: var(--text3); font-family: var(--font-mono); flex-shrink: 0; }
        .assign-select {
            flex: 1; padding: 6px 10px; background: var(--surface); border: 1px solid var(--border2);
            border-radius: 7px; font-family: var(--font-body); font-size: 13px; color: var(--text); outline: none;
        }
        .assign-select:focus { border-color: var(--teal); }
        .reassign-wrap { margin-top: 8px; }
        .reassign-select {
            width: 100%; padding: 6px 10px; background: var(--bg); border: 1px solid rgba(245,158,11,.4);
            border-radius: 7px; font-family: var(--font-body); font-size: 13px; color: var(--text); outline: none;
        }
        .reassign-panel { display: none; margin-top: 8px; padding: 10px; background: var(--amber-dim); border-radius: 8px; border: 1px solid rgba(245,158,11,.2); }
        .reassign-panel.open { display: block; }
        .reassign-warn { font-size: 11px; color: var(--amber); font-family: var(--font-mono); margin-bottom: 6px; }

        /* ── MODAL ── */
        .modal-backdrop {
            display: none; position: fixed; inset: 0; z-index: 300;
            background: rgba(1,4,9,.75); backdrop-filter: blur(6px);
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-backdrop.open { display: flex; }
        .modal {
            background: var(--bg2); border: 1px solid var(--border2);
            border-radius: 18px; padding: 28px; width: 100%; max-width: 560px;
            box-shadow: 0 24px 80px rgba(0,0,0,.6); animation: modal-pop .2s ease;
            max-height: 90vh; overflow-y: auto;
        }
        @keyframes modal-pop { from { transform: scale(.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .modal-sub { font-size: 13px; color: var(--text3); margin-bottom: 24px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
        .form-row.single { grid-template-columns: 1fr; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-label { font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--text3); font-family: var(--font-mono); }
        .form-input, .form-select, .form-textarea {
            padding: 10px 13px; background: var(--surface); border: 1px solid var(--border2);
            border-radius: 8px; font-family: var(--font-body); font-size: 14px; color: var(--text); outline: none;
            transition: border .15s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--teal); background: var(--bg3); }
        .form-textarea { min-height: 80px; resize: vertical; }
        .form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
        .modal-footer { display: flex; gap: 10px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }

        /* ── TERMIN MODAL ── */
        #terminModal .modal { max-width: 400px; }

        /* ── EMPTY ── */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
        .empty-icon { font-size: 36px; margin-bottom: 10px; }
        .empty-text { font-size: 14px; }

        /* ── SPINNER ── */
        .spinner-full { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 2px solid var(--border2); border-top-color: var(--teal); border-radius: 50%; animation: spin .65s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner-text { color: var(--text3); font-size: 13px; font-family: var(--font-mono); margin-top: 12px; }

        /* ── LOGIN ── */
        .login-bg {
            min-height: 100vh; background: var(--bg);
            display: flex; align-items: center; justify-content: center; padding: 20px;
            background-image: radial-gradient(ellipse 60% 40% at 60% 30%, rgba(14,165,233,.08) 0%, transparent 60%),
                              radial-gradient(ellipse 40% 60% at 20% 80%, rgba(168,85,247,.06) 0%, transparent 60%);
        }
        .login-card {
            background: var(--bg2); border: 1px solid var(--border); border-radius: 20px;
            padding: 44px; max-width: 400px; width: 100%; box-shadow: var(--shadow-lg);
        }
        .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
        .login-cube { width: 44px; height: 44px; background: var(--teal); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 0 30px rgba(14,165,233,.5); }
        .login-title { font-family: var(--font-display); font-size: 28px; font-weight: 800; }
        .login-role { font-size: 12px; color: var(--teal); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-top: 1px; }
        .login-desc { font-size: 14px; color: var(--text2); line-height: 1.6; margin-bottom: 28px; }
        .google-btn {
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 13px 20px; border-radius: 10px; border: 1px solid var(--border2);
            background: var(--surface); font-family: var(--font-body); font-size: 15px; font-weight: 600;
            color: var(--text); cursor: pointer; transition: all .15s;
        }
        .google-btn:hover { border-color: var(--teal); background: var(--teal-glow); color: var(--teal); box-shadow: 0 0 20px rgba(14,165,233,.2); }
        .login-note { margin-top: 16px; padding: 10px 14px; background: var(--surface); border-radius: 8px; font-size: 11px; color: var(--text3); font-family: var(--font-mono); text-align: center; }
        .error-alert { margin-bottom: 20px; padding: 12px 14px; background: var(--red-dim); border: 1px solid rgba(239,68,68,.3); border-radius: 8px; font-size: 13px; color: var(--red); }

        /* ── FEATURE PILLS (login) ── */
        .feature-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; }
        .fpill { padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; font-family: var(--font-mono); background: var(--surface2); color: var(--text3); }

        /* ── BCF EXPORT MODAL ── */
        .bcf-preview { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-family: var(--font-mono); font-size: 11px; color: var(--text2); max-height: 200px; overflow-y: auto; line-height: 1.6; margin-top: 12px; }

        /* ── RESP ── */
        @media (max-width: 960px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
            .kpi-strip { grid-template-columns: repeat(2,1fr); }
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- Nový požadavek modal -->
<div id="newReqModal" class="modal-backdrop">
    <div class="modal">
        <div class="modal-title">⊕ Nový požadavek zaměření</div>
        <div class="modal-sub">Vazba na BIM model · přesnost · BCF reference</div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Číslo objektu / Element *</label>
                <input id="nrObjekt" type="text" class="form-input" placeholder="např. SO-05 / Stěna-3F-A">
            </div>
            <div class="form-group">
                <label class="form-label">Stavební sekce</label>
                <select id="nrSekce" class="form-select">
                    <option value="">— Vyberte —</option>
                    <option>SO-01 Hlavní budova</option>
                    <option>SO-02 Parkovací dům</option>

// ── TOLERANCE LOGIC ──────────────────────────────────────────────
function computeTolStatus(req) {
    const odchylka = parseFloat(req.skutecnaOdchylka);
    const presnost = parseFloat(req.pozadovanaPresnost);
    if (isNaN(odchylka) || isNaN(presnost)) return null;
    if (odchylka <= presnost) return 'ok';
    if (odchylka <= presnost * 2) return 'warn';
    return 'crit';
}

function getDevStatus(req) {
    if (req.stav === 'Nový') return 'new';
    if (req.stav === 'Přiřazeno') return 'proc';
    const tol = computeTolStatus(req);
    if (tol === 'ok') return 'ok';
    if (tol === 'warn') return 'warn';
    if (tol === 'crit') return 'crit';
    return 'proc';
}

function tolLabel(status) {
    if (status === 'ok')   return '<span class="tag tag-ok">✓ V toleranci</span>';
    if (status === 'warn') return '<span class="tag tag-warn">⚠ Mimo toleranci</span>';
    if (status === 'crit') return '<span class="tag tag-crit">✕ Kritická odchylka</span>';
    return '';
}

function statusTag(req) {
    const s = getDevStatus(req);
    if (s === 'new')  return '<span class="tag tag-new">● Nový</span>';
    if (s === 'proc') return '<span class="tag tag-proc">◌ Zaměřuje se</span>';
    if (s === 'ok')   return '<span class="tag tag-ok">✓ V toleranci</span>';
    if (s === 'warn') return '<span class="tag tag-warn">⚠ Mimo toleranci</span>';
    if (s === 'crit') return '<span class="tag tag-crit">✕ Kritická odchylka</span>';
    return '';
}

// ── BCF EXPORT ────────────────────────────────────────────────────
function extractBcfId(poznamka) {
    const m = poznamka?.match(/\[BCF:\s*([^\]]+)\]/);
    return m ? m[1].trim() : null;
}
function extractTrimble(poznamka) {
    const m = poznamka?.match(/\[TC:\s*([^\]]+)\]/);
    return m ? m[1].trim() : null;
}
function extractPresnost(poznamka) {
    const m = poznamka?.match(/\[Přesnost:\s*±?(\d+)mm\]/);
    return m ? parseInt(m[1]) : null;

}
function extractSekce(poznamka) {
    const m = poznamka?.match(/\[Sekce:\s*([^\]]+)\]/);
    return m ? m[1].trim() : null;
}

let bcfContent = '';

window.openBcfModal = function() {
    const critReqs = state.requests.filter(r => getDevStatus(r) === 'crit' || getDevStatus(r) === 'warn');
    if (critReqs.length === 0) { alert('ℹ️ Žádné odchylky mimo toleranci k exportu'); return; }

    const now = new Date().toISOString();
    const issues = critReqs.map((req, i) => {
        const bcfId = extractBcfId(req.poznamka) || `AUTO-${i+1}`;
        const odchylka = req.skutecnaOdchylka ? `${req.skutecnaOdchylka}mm` : 'N/A';
        const presnost = extractPresnost(req.poznamka);
        const status = getDevStatus(req) === 'crit' ? 'CRITICAL' : 'WARNING';
        return `  <Topic Guid="${crypto.randomUUID()}" TopicType="Issue" TopicStatus="${status}">
    <Title>[${bcfId}] ${req.objektCislo} — odchylka ${odchylka}</Title>
    <CreationDate>${now}</CreationDate>
    <CreationAuthor>${state.currentUser?.email || 'bim@strabag.com'}</CreationAuthor>
    <Description>${req.poznamka?.replace(/\[[^\]]+\]/g,'').trim() || ''}&#10;Zaměřil: ${req.pridelenyGeodet || 'N/A'}&#10;Odchylka: ${odchylka}${presnost ? ` / Tolerance: ±${presnost}mm` : ''}</Description>
    <AssignedTo>${req.pridelenyGeodet || ''}</AssignedTo>
    <DueDate>${req.datumDokonceni || ''}</DueDate>
  </Topic>`;
    }).join('\n');

    bcfContent = `<?xml version="1.0" encoding="UTF-8"?>\n<BIM360 xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">\n<Version VersionId="2.1">\n  <DetailedVersion>2.1</DetailedVersion>\n</Version>\n${issues}\n</BIM360>`;
    document.getElementById('bcfPreview').textContent = bcfContent;
    document.getElementById('bcfModal').classList.add('open');
};
window.closeBcfModal = function() { document.getElementById('bcfModal').classList.remove('open'); };
window.downloadBcf = function() {
    const blob = new Blob([bcfContent], { type: 'application/xml' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `odchylky_${new Date().toLocaleDateString('cs-CZ').replace(/\./g,'-')}.bcf`;
    a.click();
};

window.exportExcel = function() {
    const data = state.requests.map(req => ({
        'Objekt': req.objektCislo,
        'Sekce': extractSekce(req.poznamka) || '-',
        'Typ zaměření': req.typZamereni || '-',
        'BCF Issue': extractBcfId(req.poznamka) || '-',
        'Stav': req.stav,
        'Tolerance ±mm': extractPresnost(req.poznamka) || '-',
        'Skutečná odchylka mm': req.skutecnaOdchylka || '-',
        'Status odchylky': (() => { const s=computeTolStatus(req); return s?{'ok':'V toleranci','warn':'Mimo toleranci','crit':'Kritická odchylka'}[s]:'-'; })(),
        'Přiřazený geodet': req.pridelenyGeodet || '-',
        'Datum zaměření': req.datumDokonceni || '-',
        'Zadal': req.jmeno,
        'Datum požadavku': req.datumPozadavku,
        'Trimble Connect': extractTrimble(req.poznamka) || '-',
        'Poznámka': (req.poznamka||'').replace(/\[[^\]]+\]/g,'').trim()
    }));
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(data);
    XLSX.utils.book_append_sheet(wb, ws, 'BIM Zaměření');
    XLSX.writeFile(wb, `BIM_zaměření_${new Date().toLocaleDateString('cs-CZ').replace(/\./g,'-')}.xlsx`);
};

onAuthStateChanged(auth, (user) => {
    state.isLoading = false;
    if (user) {
        const ok = ALLOWED_EMAILS.some(e => user.email.toLowerCase().includes(e.toLowerCase()));
        if (ok) {
            state.isAuthenticated = true;
            state.currentUser = user;
            state.loginError = null;
            loadRequests();
        } else {
            state.isAuthenticated = false;
            state.currentUser = null;
            state.loginError = 'Nemáte oprávnění.';
            firebaseSignOut(auth);
        }
    } else {
        state.isAuthenticated = false;
        state.currentUser = null;
    }
    render();
});

            type: 'doughnut',
            data: {

                cutout: '72%',
                plugins: {
                    legend: { position:'bottom', labels:{ color:'#8b949e', font:{family:'Barlow',size:11}, padding:12, usePointStyle:true, pointStyleWidth:7 } }
                }
            }
        });
    }

    // Bar — odchylky vs. tolerance
    const ctxB = document.getElementById('chartDev');
    if (ctxB) {
        if (chartDeviation) chartDeviation.destroy();
        const completed = reqs.filter(r => r.skutecnaOdchylka && r.poznamka?.includes('[Přesnost:'));
        const labels = completed.map(r => r.objektCislo);
        const dOdchylka = completed.map(r => parseFloat(r.skutecnaOdchylka));
        const dTolerance = completed.map(r => extractPresnost(r.poznamka));
        const barColors = completed.map(r => {
            const s = computeTolStatus(r);
            return s==='ok' ? '#22c55e' : s==='warn' ? '#f59e0b' : '#ef4444';
        });

        chartDeviation = new Chart(ctxB, {
            type: 'bar',
            data: {
                labels: labels.length ? labels : ['—'],
                datasets: [
                    {
                        label: 'Skutečná odchylka (mm)',
                        data: dOdchylka.length ? dOdchylka : [0],
                        backgroundColor: barColors,
                        borderRadius: 5, borderSkipped: false
                    },
                    {
                        label: 'Tolerance (mm)',
                        data: dTolerance.length ? dTolerance : [0],
                        type: 'line',
                        borderColor: '#0ea5e9',
                        backgroundColor: 'transparent',
                        borderWidth: 1.5,
                        borderDash: [4,3],
                        pointRadius: 3,
                        pointBackgroundColor: '#0ea5e9',
                        order: 0
                    }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { grid:{color:'#21262d'}, ticks:{color:'#8b949e',font:{family:'Space Mono',size:10}} },
                    y: { beginAtZero:true, grid:{color:'#21262d'}, ticks:{color:'#8b949e',font:{family:'Space Mono',size:11}}, title:{display:true,text:'mm',color:'#484f58',font:{family:'Space Mono',size:10}} }
                },
                plugins: {
                    legend:{ labels:{color:'#8b949e',font:{family:'Barlow',size:11},usePointStyle:true,pointStyleWidth:7} }
                }
            }
        });
    }
}

// ── COVERAGE BARS ─────────────────────────────────────────────────
function renderCoverageSection() {
    const reqs = state.requests;
    const sections = {};
    reqs.forEach(r => {
        const sekce = extractSekce(r.poznamka) || 'Neurčeno';
        if (!sections[sekce]) sections[sekce] = { total:0, done:0 };
        sections[sekce].total++;
        if (r.stav === 'Dokončeno') sections[sekce].done++;
    });

    if (Object.keys(sections).length === 0) return '<p style="color:var(--text3);font-size:13px">Žádná data</p>';

    return Object.entries(sections).sort((a,b) => b[1].total - a[1].total).map(([name, d]) => {
        const pct = d.total > 0 ? Math.round((d.done/d.total)*100) : 0;
        const col = pct >= 75 ? '#22c55e' : pct >= 40 ? '#f59e0b' : '#ef4444';
        return `
        <div class="cov-row">
            <span class="cov-label">${name.replace('SO-0','SO-').substring(0,12)}</span>
            <div class="cov-track">
                <div class="cov-fill" style="width:${pct}%;background:${col}"></div>
            </div>
            <span class="cov-pct" style="color:${col}">${pct}%</span>
            <span class="cov-count">${d.done}/${d.total}</span>
        </div>`;
    }).join('');
}

// ── RENDER REQUEST CARD ───────────────────────────────────────────
function renderCard(req) {
    const s = getDevStatus(req);
    const odchylka = req.skutecnaOdchylka ? parseFloat(req.skutecnaOdchylka) : null;
    const presnost = extractPresnost(req.poznamka);
    const bcfId = extractBcfId(req.poznamka);
    const trimble = extractTrimble(req.poznamka);
    const sekce = extractSekce(req.poznamka);
    const cleanNote = (req.poznamka||'').replace(/\[[^\]]+\]/g,'').trim();
    const fotkyIds = parseFileIds(req.fotkaFileId);

    const iconMap = { crit:'⚠', warn:'△', ok:'✓', proc:'◎', new:'◈' };
    const iconClass = { crit:'icon-crit', warn:'icon-warn', ok:'icon-ok', proc:'icon-proc', new:'icon-new' };

    // Tolerance gauge
    let gaugeHtml = '';
    if (odchylka !== null && presnost) {
        const maxVal = Math.max(odchylka, presnost * 2.5);
        const fillPct = Math.min(100, (odchylka/maxVal)*100);
        const markerPct = (presnost/maxVal)*100;
        const fillColor = s==='ok'?'#22c55e':s==='warn'?'#f59e0b':'#ef4444';
        gaugeHtml = `
        <div class="tol-gauge">
            <span style="font-family:var(--font-mono);font-size:10px;color:var(--text3)">0</span>
            <div class="tol-track">
                <div class="tol-fill" style="width:${fillPct}%;background:${fillColor}"></div>
                <div class="tol-marker" style="left:${markerPct}%;"></div>
            </div>
            <span style="font-family:var(--font-mono);font-size:10px;color:var(--text3)">${Math.round(maxVal)}mm</span>
        </div>
        <div class="tol-nums"><span>skutečná: ${odchylka}mm</span><span>tolerance: ±${presnost}mm</span></div>`;
    }

    return `
    <div class="dev-card ${s}">
        <div class="dev-status-icon ${iconClass[s]}">${iconMap[s]}</div>
        <div class="dev-main">
            <div class="dev-obj">${req.objektCislo}</div>
            <div class="dev-meta">${req.datumPozadavku} · ${req.jmeno}${sekce ? ` · ${sekce}` : ''}</div>
            <div class="dev-tags">
                ${statusTag(req)}
                ${req.typZamereni ? `<span class="tag tag-type">${req.typZamereni}</span>` : ''}
                ${bcfId ? `<a href="#" class="dev-bcf-link" onclick="return false">BCF ${bcfId}</a>` : ''}
                ${trimble ? `<a href="${trimble}" target="_blank" class="dev-bcf-link">⊞ Trimble Connect</a>` : ''}
            </div>
            ${cleanNote ? `<div class="dev-note">${cleanNote}</div>` : ''}
            ${gaugeHtml}

            ${req.stav === 'Nový' ? `
            <div class="assign-row">
                <span class="assign-label">Přiřadit geodeta:</span>
                <select class="assign-select" onchange="assignGeodet('${req.id}',this.value)">
                    <option value="">— Vyberte —</option>
                    ${geodeti.map(g=>`<option value="${g}">${g}</option>`).join('')}
                </select>
            </div>` : ''}

            ${req.stav === 'Přiřazeno' ? `
            <div class="assign-row">
                <span class="assign-label">Geodet:</span>
                <span style="font-weight:600;color:var(--teal);font-size:13px">${req.pridelenyGeodet}</span>
                <button onclick="toggleReassign('${req.id}')" class="btn btn-amber btn-sm" style="margin-left:auto">🔄 Přeřadit</button>
            </div>
            <div id="rp-${req.id}" class="reassign-panel">
                <div class="reassign-warn">⚠ Geodet nemůže přijet — vyberte náhradníka:</div>
                <select class="reassign-select" onchange="reassignGeodet('${req.id}',this.value)">
                    <option value="">— Náhradník —</option>
                    ${geodeti.filter(g=>g!==req.pridelenyGeodet).map(g=>`<option value="${g}">${g}</option>`).join('')}
                </select>
            </div>` : ''}

            ${req.pozadovaneDatum && req.pozadovanyCas && req.terminPotvrzen !== 'Ano' && req.stav === 'Nový' ? `
            <div style="margin-top:10px">
                <button onclick="openTerminModal('${req.id}','${req.pozadovaneDatum}','${req.pozadovanyCas}')" class="btn btn-ghost btn-sm">📅 Potvrdit termín ${req.pozadovaneDatum}</button>
            </div>` : ''}

            ${req.stav === 'Dokončeno' ? `
            <div style="margin-top:10px;padding:12px 14px;background:var(--surface);border-radius:8px;display:flex;gap:16px;flex-wrap:wrap;font-size:12px;font-family:var(--font-mono)">
                <span style="color:var(--text2)">Geodet: <strong style="color:var(--text)">${req.pridelenyGeodet||'-'}</strong></span>
                <span style="color:var(--text2)">Datum: <strong style="color:var(--text)">${req.datumDokonceni||'-'}</strong></span>
                ${req.poznamkaGeodeta ? `<span style="color:var(--text2)">Pozn.: <strong style="color:var(--text)">${req.poznamkaGeodeta}</strong></span>` : ''}
                ${fotkyIds.map((id,i)=>`<a href="${driveUrl(id)}" target="_blank" style="color:var(--teal)">📷 Soubor ${i+1}</a>`).join('')}
            </div>` : ''}
        </div>
        <div class="dev-right">
            ${odchylka !== null ? `
            <div class="dev-tolerance-block">
                <div class="dev-tol-label">Odchylka</div>
                <div class="dev-tol-val" style="color:${s==='ok'?'#22c55e':s==='warn'?'#f59e0b':'#ef4444'}">${odchylka}<span style="font-size:14px">mm</span></div>
                ${presnost ? `<div class="dev-tol-req">tol. ±${presnost}mm</div>` : ''}
            </div>` : presnost ? `
            <div class="dev-tolerance-block">
                <div class="dev-tol-label">Tolerance</div>
                <div class="dev-tol-val" style="color:var(--text3);font-size:18px">±${presnost}<span style="font-size:12px">mm</span></div>
            </div>` : ''}
            <div class="dev-actions">
                ${req.prilohaFileId ? `<a href="${driveUrl(req.prilohaFileId)}" target="_blank" class="btn btn-ghost btn-sm">🔎 Příloha</a>` : ''}
            </div>
        </div>
    </div>`;
}

// ── DASHBOARD VIEW ────────────────────────────────────────────────
function renderDashboard() {
    const reqs = state.requests;

        </div>

            <div class="kpi-label">Kritické odchylky</div>
            <div class="kpi-val">${crit}</div>
            <div class="kpi-sub">eskalovat ihned</div>
        </div>
        <div class="kpi kpi-purple" onclick="setView('requests');setFilter('proc')">

            <div class="kpi-val">${nw + proc}</div>

    <div class="charts-grid">
        <div class="chart-card">
            <div class="chart-header">
                <div>
                    <div class="chart-title">Status odchylek</div>
                    <div class="chart-sub">as-built vs. projekt</div>
                </div>
            </div>
            <canvas id="chartDonut" style="max-height:220px"></canvas>
        </div>
        <div class="chart-card">
            <div class="chart-header">
                <div>
                    <div class="chart-title">Odchylky vs. tolerance</div>

                </div>
            </div>

                <canvas id="chartDev"></canvas>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
        <div class="chart-card">
            <div class="chart-title" style="margin-bottom:16px">Pokrytí zaměřeními dle sekce</div>
            <div class="coverage-grid">${renderCoverageSection()}</div>
        </div>
        <div class="chart-card">
            <div class="chart-title" style="margin-bottom:16px">Aktivní problémy</div>
            ${recent.length === 0 ? '<p style="color:var(--text3);font-size:13px;font-family:var(--font-mono)">Žádné aktivní problémy ✓</p>' :
            recent.map(req => {

// ── REQUESTS VIEW ─────────────────────────────────────────────────
function renderRequests() {
    const filterMap = {
        all:  r => true,
        new:  r => getDevStatus(r) === 'new',
        proc: r => getDevStatus(r) === 'proc',
        ok:   r => getDevStatus(r) === 'ok',
        warn: r => getDevStatus(r) === 'warn',
        crit: r => getDevStatus(r) === 'crit',
    };
    const filtered = state.requests.filter(filterMap[state.filterTol] || filterMap.all);

    const tabClass = (f) => {
        const base = 'filter-tab';
        if (state.filterTol !== f) return base;
        const map = { all:'active-all', new:'active-new', proc:'active-new', ok:'active-done', warn:'active-assigned', crit:'active-crit' };
        return `${base} ${map[f]||''}`;
    };

    const reqs = state.requests;
    const counts = {
        all: reqs.length,
        new: reqs.filter(r=>getDevStatus(r)==='new').length,
        proc: reqs.filter(r=>getDevStatus(r)==='proc').length,
        ok: reqs.filter(r=>getDevStatus(r)==='ok').length,
        warn: reqs.filter(r=>getDevStatus(r)==='warn').length,
        crit: reqs.filter(r=>getDevStatus(r)==='crit').length,
    };

    return `
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:14px;padding:16px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <button class="filter-tab ${tabClass('all')}" onclick="setFilter('all')">Vše (${counts.all})</button>
        <button class="filter-tab ${tabClass('new')}" onclick="setFilter('new')" style="${state.filterTol==='new'?'':''}">Nové (${counts.new})</button>
        <button class="filter-tab ${tabClass('proc')}" onclick="setFilter('proc')">Zaměřuje se (${counts.proc})</button>
        <button class="filter-tab ${tabClass('ok')}" onclick="setFilter('ok')">V toleranci (${counts.ok})</button>
        <button class="filter-tab ${tabClass('warn')}" onclick="setFilter('warn')">Mimo toleranci (${counts.warn})</button>
        <button class="filter-tab ${tabClass('crit')}" onclick="setFilter('crit')" style="color:var(--red)">⚠ Kritické (${counts.crit})</button>
    </div>
    <div class="dev-grid">
        ${filtered.length === 0 ?
            `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Žádné záznamy v tomto filtru</div></div>` :
            filtered.map(renderCard).join('')
        }
    </div>`;
}

                </div>
                <div class="topbar-right">
                    ${crit > 0 ? `<span style="background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.3);font-size:12px;font-family:var(--font-mono);font-weight:700;padding:5px 12px;border-radius:7px">⚠ ${crit} kritická odchylka${crit>1?'':''}!</span>` : ''}
                    <button class="btn btn-teal" onclick="openNewReqModal()">⊕ Nový požadavek</button>
                </div>
            </div>

            <div class="page-content">
                ${state.loading ? `<div style="text-align:center;padding:60px"><div class="spinner" style="margin:0 auto"></div><div class="spinner-text" style="margin-top:12px">Načítám data…</div></div>` :
                  state.view === 'dashboard' ? renderDashboard() : renderRequests()
                }
            </div>
        </main>
    </div>`;

    // Bind window functions
    window.refreshData = loadRequests;
    window.setView = function(v) { state.view=v; state.filterTol='all'; render(); };
    window.setFilter = function(f) { state.filterTol=f; state.view='requests'; render(); };

    if (state.view === 'dashboard' && reqs.length > 0) {
        requestAnimationFrame(() => renderCharts());
    }
}

render();
</script>
</body>
</html>
